# Example docker-compose for Mycel
# Usage: docker-compose up

services:
  mycel:
    build: .
    # Or use pre-built:
    # image: mdenda/mycel:latest        # Docker Hub
    # image: ghcr.io/matutetandil/mycel:latest  # GitHub Container Registry
    ports:
      - "3000:3000"
    volumes:
      # Mount your config directory to /etc/mycel (standard path)
      - ./my-service:/etc/mycel:ro
    environment:
      # Mycel runtime configuration
      - MYCEL_ENV=production           # Environment: development, staging, production
      - MYCEL_LOG_LEVEL=info           # Log level: debug, info, warn, error
      - MYCEL_LOG_FORMAT=json          # Log format: text, json (use json for production)
      # Your application config (used in HCL files via env() function)
      - DB_HOST=postgres
      - DB_USER=mycel
      - DB_PASSWORD=secret
      - DB_NAME=mycel
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mycel
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mycel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mycel"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

